# =============================================================================
# Nginx — MailCue Reverse Proxy and Static File Server
# =============================================================================

worker_processes auto;
pid /run/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 256;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Logging -------------------------------------------------------------
    access_log /dev/stdout combined;

    # --- Performance ---------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # --- Gzip ----------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # --- Upstream: Uvicorn (FastAPI) -----------------------------------------
    upstream api_backend {
        server 127.0.0.1:8000;
        keepalive 8;
    }

    # --- Include additional server blocks (e.g. HTTPS in production) ---------
    include /etc/nginx/conf.d/*.conf;

    # --- Server block --------------------------------------------------------
    server {
        listen 80 default_server;
        server_name _;

        root /var/www/mailcue;
        index index.html;

        # --- API proxy -------------------------------------------------------
        # All /api/* requests are forwarded to the FastAPI application.
        location /api/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            # Reasonable timeouts for API requests
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # --- Sandbox proxy ---------------------------------------------------
        # Messaging sandbox endpoints (Telegram, Slack, Mattermost, Twilio).
        location /sandbox/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # --- HTTP Bin proxy ---------------------------------------------------
        location /httpbin/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # --- SSE stream (Server-Sent Events) --------------------------------
        # Dedicated location for the event stream with SSE-appropriate headers.
        location /api/v1/events/stream {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            # Critical SSE settings — disable all buffering
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            proxy_read_timeout 3600s;

            # Prevent Nginx from adding content-encoding headers
            add_header X-Accel-Buffering no;
        }

        # --- ACME challenge (Let's Encrypt cert provisioning) ----------------
        # Serves ACME HTTP-01 challenge files for certificate validation.
        # Needed in both test and production modes for cert provisioning.
        location /.well-known/acme-challenge/ {
            root /var/www/acme-challenge;
            try_files $uri =404;
        }

        # --- Well-known paths (MTA-STS, etc.) ---------------------------------
        # RFC 8461 requires /.well-known/mta-sts.txt at the root path.
        location /.well-known/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Static frontend files -------------------------------------------
        # Serve the built frontend (React/Vite output).
        location / {
            try_files $uri $uri/ /index.html;
        }

        # --- Caching for static assets ---------------------------------------
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
    }
}
