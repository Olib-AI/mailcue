# =============================================================================
# OpenDMARC — MailCue DMARC Verification
# =============================================================================

AuthservID              mailcue
TrustedAuthservIDs      mailcue

# Socket for Postfix milter integration
Socket                  local:/var/run/opendmarc/opendmarc.sock

# Reject policy — add headers but don't reject (leave to user/admin)
RejectFailures          false

# Ignore authentication results from internal hosts
IgnoreAuthenticatedClients  true

# DMARC policy handling
FailureReports          false
CopyFailuresTo         postmaster@localhost

# Runtime
PidFile                /var/run/opendmarc/opendmarc.pid
UserID                 opendmarc
UMask                  002

# History file for reporting
HistoryFile            /var/run/opendmarc/opendmarc.dat

# Use SPF results from Authentication-Results header
SPFSelfValidate        true

# Logging
Syslog                 true
SyslogFacility         mail
