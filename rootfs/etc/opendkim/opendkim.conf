# =============================================================================
# OpenDKIM — MailCue DKIM Signing Configuration
# =============================================================================

# --- Logging -----------------------------------------------------------------
Syslog            yes
SyslogSuccess     yes
LogWhy            yes

# --- Signing mode ------------------------------------------------------------
# s = sign outbound, v = verify inbound
Mode              sv

# --- Canonicalization --------------------------------------------------------
Canonicalization  relaxed/relaxed

# --- Key management ----------------------------------------------------------
KeyTable          refile:/etc/opendkim/KeyTable
SigningTable      refile:/etc/opendkim/SigningTable
ExternalIgnoreList /etc/opendkim/TrustedHosts
InternalHosts      /etc/opendkim/TrustedHosts

# --- Subdomains --------------------------------------------------------------
SubDomains        no

# --- Socket (unix socket for Postfix milter integration) --------------------
Socket            local:/var/run/opendkim/opendkim.sock

# --- Runtime -----------------------------------------------------------------
PidFile           /var/run/opendkim/opendkim.pid
UserID            opendkim:opendkim
UMask             002

# --- Headers covered by the signature ---------------------------------------
# Broader than OpenDKIM's default, matching M3AAWG sender best-practice
# guidance. Receivers like iCloud and Microsoft 365 downscore signatures
# whose `h=` field is suspiciously narrow (e.g. just From/To/Subject/Date),
# so we cover every header a normal MUA would set.
SignHeaders       From,Reply-To,Subject,Date,To,Cc,In-Reply-To,References,Message-ID,MIME-Version,Content-Type,Content-Transfer-Encoding,List-Unsubscribe,List-Unsubscribe-Post,List-ID,Resent-Date,Resent-From,Resent-Sender,Resent-To,Resent-Cc

# --- Headers that MUST be signed even when absent (oversigned) --------------
# OpenDKIM signs each named header twice: once as "present & equals X",
# once as "absent". An attacker can no longer slip an additional, unsigned
# copy of these headers past the signature without breaking it. From /
# Subject / Reply-To are the highest-impact targets for display-name and
# reply-to spoofing.
OversignHeaders   From,Subject,Reply-To,To,Cc

# --- Misc --------------------------------------------------------------------
AutoRestart       yes
AutoRestartRate   10/1M
Background        no
DNSTimeout        5
SignatureAlgorithm rsa-sha256
