# =============================================================================
# Dovecot — MailCue IMAP / POP3 / LMTP Server
# Single-file configuration for simplicity in a testing tool.
# =============================================================================

# --- Protocols ---------------------------------------------------------------
protocols = imap pop3 lmtp

# --- Listening ---------------------------------------------------------------
listen = *

# --- Logging -----------------------------------------------------------------
log_path = /dev/stderr
info_log_path = /dev/stdout
debug_log_path = /dev/null

# --- Mail location (Maildir format) ------------------------------------------
# %d = domain, %n = local username part
mail_location = maildir:/var/mail/vhosts/%d/%n
mail_privileged_group = vmail

# --- Namespace with SPECIAL-USE folders (RFC 6154) ----------------------------
namespace inbox {
  inbox = yes
  separator = /

  mailbox Drafts {
    auto = subscribe
    special_use = \Drafts
  }

  mailbox Junk {
    auto = subscribe
    special_use = \Junk
  }

  mailbox Sent {
    auto = subscribe
    special_use = \Sent
  }

  mailbox "Sent Messages" {
    special_use = \Sent
  }

  mailbox "Sent Items" {
    special_use = \Sent
  }

  mailbox Trash {
    auto = subscribe
    special_use = \Trash
  }

  mailbox Archive {
    auto = no
    special_use = \Archive
  }
}

# --- Authentication ----------------------------------------------------------
auth_mechanisms = plain login

# passwd-file backend — simple, file-based virtual user authentication.
# The users file is managed by the init script and the FastAPI API.
# result_failure=continue allows fallthrough to the static passdb for
# catch-all users not in the file.
passdb {
  driver = passwd-file
  args = scheme=SHA512-CRYPT /etc/dovecot/users
  result_failure = continue
}

# Catch-all passdb: accept any user that was not found in the passwd-file.
# Uses nopassword=y so that master user impersonation works for catch-all
# addresses. This is acceptable for a testing/development server.
# TEST MODE ONLY: In production mode, the init script (init-mailcue.sh)
# comments out this block at runtime to disable catch-all authentication.
passdb {
  driver = static
  args = nopassword=y
}

userdb {
  driver = passwd-file
  args = /etc/dovecot/users
  default_fields = uid=vmail gid=vmail home=/var/mail/vhosts/%d/%n
}

# Catch-all fallback userdb: provides uid/gid/home for ANY user not in
# the passwd-file. Creates a Maildir on first delivery.
# allow_all_users=yes is passed in args for the static driver.
# TEST MODE ONLY: In production mode, the init script (init-mailcue.sh)
# comments out this block at runtime to disable catch-all user lookup.
userdb {
  driver = static
  args = uid=5000 gid=5000 home=/var/mail/vhosts/%d/%n allow_all_users=yes
}

# --- Master user (API impersonation) -----------------------------------------
# Allows the FastAPI backend to authenticate as any user by logging in as
# "targetuser@domain*admin@domain" with the admin password.
auth_master_user_separator = *

passdb {
  driver = passwd-file
  args = /etc/dovecot/master-users
  master = yes
  pass = yes
}

# --- SSL / TLS ---------------------------------------------------------------
# TEST MODE default: ssl = yes (allow but don't require TLS).
# In production mode, the init script changes this to ssl = required
# and sets disable_plaintext_auth = yes.
ssl = yes
ssl_cert = </etc/ssl/mailcue/server.crt
ssl_key = </etc/ssl/mailcue/server.key
ssl_min_protocol = TLSv1.2
ssl_cipher_list = ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305
ssl_prefer_server_ciphers = yes
ssl_verify_client_cert = no

# --- Service listeners -------------------------------------------------------

# IMAP
service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

# POP3
service pop3-login {
  inet_listener pop3 {
    port = 110
  }
  inet_listener pop3s {
    port = 995
    ssl = yes
  }
}

# LMTP — receives mail from Postfix
service lmtp {
  # Unix socket inside the Postfix chroot
  unix_listener /var/spool/postfix/private/dovecot-lmtp {
    mode = 0600
    user = postfix
    group = postfix
  }
  # TCP listener for programmatic injection from the API
  inet_listener lmtp {
    address = 127.0.0.1
    port = 24
  }
}

# Auth socket for Postfix SASL
service auth {
  unix_listener /var/spool/postfix/private/auth {
    mode = 0660
    user = postfix
    group = postfix
  }
  unix_listener auth-userdb {
    mode = 0600
    user = vmail
  }
}

service auth-worker {
  user = root
}

# --- IMAP protocol settings --------------------------------------------------
protocol imap {
  mail_max_userip_connections = 20
  imap_idle_notify_interval = 2 mins
}

# --- POP3 protocol settings --------------------------------------------------
protocol pop3 {
  pop3_uidl_format = %08Xu%08Xv
  mail_max_userip_connections = 10
}

# --- Auto-create mailboxes on delivery (catch-all support) -------------------
lda_mailbox_autocreate = yes
lda_mailbox_autosubscribe = yes

# --- LMTP protocol settings --------------------------------------------------
protocol lmtp {
  mail_plugins = $mail_plugins
  # Note: overridden at runtime by init-mailcue if MAILCUE_DOMAIN changes
  postmaster_address = postmaster@mailcue.local
  lda_mailbox_autocreate = yes
  lda_mailbox_autosubscribe = yes
}

# --- Quota plugin (500 MB default per mailbox) --------------------------------
plugin {
  quota = maildir:User quota
  quota_rule = *:storage=500M
  quota_grace = 10%%
}

# --- First valid UID/GID (matches the vmail user) ----------------------------
first_valid_uid = 5000
last_valid_uid = 5000
first_valid_gid = 5000
last_valid_gid = 5000
