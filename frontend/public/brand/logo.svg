<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 100" fill="none">
  <defs>
    <clipPath id="env-clip">
      <rect x="16" y="10" width="100" height="76" rx="10"/>
    </clipPath>
  </defs>

  <!-- Envelope base (medium green) -->
  <rect x="16" y="10" width="100" height="76" rx="10" fill="#3A7D5C"/>

  <g clip-path="url(#env-clip)">
    <!-- Front bottom fold (lighter green) -->
    <path d="M16 86 L16 52 L62 73 Q66 75 70 73 L116 52 L116 86 Z" fill="#52A97C"/>

    <!-- Flap (darker green from top, slightly softened vertex) -->
    <path d="M16 10 L116 10 L116 48 L70 67 Q66 69 62 67 L16 48 Z" fill="#2B5F43"/>
  </g>

  <!-- Checkmark badge -->
  <circle cx="108" cy="16" r="15" fill="#7FBD8A" stroke="white" stroke-width="2.5"/>
  <path d="M100.5 16.5 L105 21 L115.5 11" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "MailCue" wordmark -->
  <text x="144" y="65" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="50" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#1E293B">Mail</tspan><tspan fill="#3A7D5C">Cue</tspan>
  </text>
</svg>
