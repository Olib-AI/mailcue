<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" fill="none">
  <defs>
    <clipPath id="env-clip">
      <rect x="10" y="10" width="100" height="76" rx="10"/>
    </clipPath>
  </defs>

  <!-- Envelope base (medium green) -->
  <rect x="10" y="10" width="100" height="76" rx="10" fill="#3A7D5C"/>

  <g clip-path="url(#env-clip)">
    <!-- Front bottom fold (lighter green) -->
