  </g>

  <!-- Checkmark badge -->
  <circle cx="102" cy="16" r="15" fill="#7FBD8A" stroke="white" stroke-width="2.5"/>
  <path d="M94.5 16.5 L99 21 L109.5 11" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
